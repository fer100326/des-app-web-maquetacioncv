<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portafolio de Mafer - Ingeniería en Diseño Multimedia. Especialista en Modelado 3D, Ilustración e Infografías.">
    <title>Contacto | Mafer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#curriculum">Currículum</a></li>
            <li><a href="portafolio.html">Portafolio</a></li>
        </ul>
    </nav>

    <section class="contact-page" style="padding-top: 50px;">
        <div class="container-contact">
            <div class="contact-info">
                <h2>¡Hablemos de tu <span>próximo proyecto</span>!</h2>
                <p>Si buscas una ilustración personalizada o un modelo 3D, llena el formulario y me pondré en contacto contigo pronto.</p>

                <div class="contact-details">
                    <div class="item">
                        <img src="img/ubicación.png" alt="Ubicación" class="contact-icon-img">
                        <span class="text">Ciudad del Carmen, Campeche</span>
                    </div>
                    <div class="item">
                        <img src="img/correo.png" alt="Correo" class="contact-icon-img">
                        <span class="text">fernandaeuan28@gmail.com</span>
                    </div>
                </div>
            </div>

            <form class="contact-form" action="https://formspree.io/f/xvzdojqe" method="POST">
                <input type="text" name="nombre" placeholder="Tu nombre" required>
                <input type="email" name="email" placeholder="Tu correo electrónico" required>
                <textarea name="mensaje" placeholder="¿En qué puedo ayudarte?" rows="6" required></textarea>
                
                <input type="hidden" name="_subject" value="Nuevo mensaje desde tu Portafolio">
                
                <button type="submit" class="btn-primary">Enviar Mensaje</button>
            </form>
        </div>
    </section>

</body>
</html>
